name: 打包发布

# 两种触发方式：
# 1. 推送 v 开头的 tag（如 v1.0.0）→ 自动创建 GitHub Release 并附带 zip
# 2. 在 Actions 页面手动点击 "Run workflow" → 只打包不发布，下载 artifact
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备打包目录
        run: |
          mkdir -p package/shipingwenan
          rsync -av --exclude='.git' --exclude='.github' \
                 --exclude='__pycache__' --exclude='output' \
                 --exclude='.env' ./ package/shipingwenan/

      - name: 打包成 zip
        run: |
          cd package
          zip -r ../shipingwenan.zip shipingwenan/
          cd ..
          ls -lh shipingwenan.zip

      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shipingwenan
          path: shipingwenan.zip
          retention-days: 30

      - name: 创建 GitHub Release（仅 tag 触发时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: shipingwenan.zip
          name: AI冷知识视频生产线 ${{ github.ref_name }}
          body: |
            ## 下载即用版

            下载下方的 `shipingwenan.zip`，解压后按里面的「快速开始.txt」操作即可。

            ## 包含内容
            - 完整 Python 源码
            - 配置模板 .env.example
            - 使用说明 README.md + 快速开始.txt
            - 依赖清单 requirements.txt

            ## 快速开始
            1. 解压 zip
            2. 复制 .env.example 为 .env，填入 API Key
            3. `pip install -r requirements.txt`
            4. `python pipeline.py`
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
